<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>YaraDutyFree — Fragancias Árabes</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FDF6F2">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- iOS fullscreen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="YaraDutyFree">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --rose:    #C0356A;
      --rose-lt: #F07BA0;
      --rose-dk: #880A40;
      --gold:    #D4983A;
      --gold-lt: #F0C060;
      --gold-dk: #A06820;
      --bg:      #FFF8F5;
      --surf:    #FFFFFF;
      --card:    #FFF2F6;
      --card2:   #FFE8EF;
      --bdr:     #F0B0C5;
      --bdr2:    #F8D8E4;
      --text:    #28101C;
      --muted:   #9A6070;
      --green:   #28A060;
      --red:     #C02030;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'Lato', sans-serif; min-height:100vh; }
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background:
        radial-gradient(ellipse 90% 55% at 15%  8%, rgba(255,200,220,.50) 0%, transparent 55%),
        radial-gradient(ellipse 70% 45% at 85% 85%, rgba(255,180,210,.40) 0%, transparent 55%),
        radial-gradient(ellipse 55% 65% at 60% 42%, rgba(255,230,240,.30) 0%, transparent 65%),
        radial-gradient(ellipse 40% 30% at 40% 90%, rgba(255,210,170,.25) 0%, transparent 55%);
    }
    body > * { position:relative; z-index:1; }

    /* ── Header — rich gradient ── */
    .site-header {
      background: linear-gradient(135deg, #8B1040 0%, #C0306A 35%, #E04878 55%, #E8704A 80%, #D4983A 100%);
      border-bottom: none;
      position:sticky; top:0; z-index:100;
      box-shadow: 0 4px 24px rgba(140,20,60,.35);
    }
    .header-inner { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; max-width:900px; margin:0 auto; }
    .logo-name {
      font-family:'Playfair Display', serif; font-size:1.5rem; font-weight:700;
      letter-spacing:.07em; text-transform:uppercase; color:#fff;
      text-shadow: 0 2px 8px rgba(0,0,0,.20);
      background: linear-gradient(135deg, #fff8e0 0%, #ffe4b0 40%, #fff 70%, #ffd6e8 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      background-size:200% 200%; animation: shimmer 4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%,100% { background-position:0% 50%; }
      50%      { background-position:100% 50%; }
    }
    .logo-tagline { font-size:.57rem; letter-spacing:.22em; color:rgba(255,255,255,.75); text-transform:uppercase; margin-top:3px; }
    .logo-orn { height:1px; margin-top:5px; background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent); }
    .header-right { display:flex; align-items:center; gap:12px; }
    .ws-status { display:flex; align-items:center; gap:5px; }
    .ws-dot { width:7px; height:7px; border-radius:50%; background:#FF6B6B; transition:background .6s;
      box-shadow:0 0 6px rgba(255,107,107,.8); }
    .ws-dot.live { background:#50E080; box-shadow:0 0 8px rgba(80,224,128,.9); animation:blink 2.5s infinite; }
    .ws-dot.conn { background:#FFD060; box-shadow:0 0 6px rgba(255,208,96,.8); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
    .ws-label { font-size:.62rem; color:rgba(255,255,255,.80); letter-spacing:.06em; }
    .icon-btn {
      background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.35); color:#fff;
      width:32px; height:32px; cursor:pointer; font-size:14px; border-radius:4px;
      transition:background .2s, border-color .2s; display:flex; align-items:center; justify-content:center;
      backdrop-filter:blur(4px);
    }
    .icon-btn:hover { background:rgba(255,255,255,.28); border-color:rgba(255,255,255,.6); }
    .cart-toggle {
      display:flex; align-items:center; gap:8px;
      background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.40);
      color:#fff; padding:7px 16px; border-radius:4px;
      font-size:.68rem; letter-spacing:.12em; text-transform:uppercase;
      cursor:pointer; transition:background .2s; backdrop-filter:blur(4px);
    }
    .cart-toggle:hover { background:rgba(255,255,255,.30); }
    .cart-count {
      background:#FFE040; color:#3A1020;
      font-size:.58rem; font-weight:700;
      min-width:17px; height:17px; border-radius:50%;
      display:none; align-items:center; justify-content:center;
    }

    /* ── Search ── */
    .search-wrap {
      background: linear-gradient(135deg, #FFF0F5 0%, #FFF8F0 100%);
      border-bottom:2px solid var(--bdr2); padding:12px 24px;
    }
    .search-inner { max-width:900px; margin:0 auto; position:relative; }
    .search-ico { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--rose); pointer-events:none; font-size:13px; }
    .search-input {
      width:100%; background:#fff; border:1.5px solid var(--bdr);
      color:var(--text); padding:10px 14px 10px 36px; border-radius:24px;
      font-size:.82rem; font-family:'Lato', sans-serif; outline:none;
      transition:border-color .2s, box-shadow .2s;
      box-shadow: 0 2px 8px rgba(192,53,106,.08);
    }
    .search-input::placeholder { color:var(--muted); }
    .search-input:focus { border-color:var(--rose); box-shadow:0 2px 16px rgba(192,53,106,.18); }

    /* ── Main container ── */
    .main-wrap { max-width:900px; margin:0 auto; padding:18px 16px 60px; }

    /* ── Brand folder ── */
    .brand-folder { margin-bottom:12px; }
    .folder-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 20px; cursor:pointer;
      background: #FFFFFF;
      border:1.5px solid var(--bdr2);
      border-left: 4px solid var(--rose);
      border-radius:10px;
      box-shadow: 0 3px 16px rgba(192,53,106,.10), 0 1px 4px rgba(192,53,106,.06);
      transition:all .22s cubic-bezier(.4,0,.2,1);
      user-select:none; position:relative; overflow:hidden;
    }
    .folder-header::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg, rgba(255,220,235,.30) 0%, transparent 60%);
      pointer-events:none;
    }
    .folder-header:hover {
      background: linear-gradient(135deg, #fff5f8 0%, #fff0f5 100%);
      border-color: var(--rose);
      border-left-color: var(--rose-dk);
      box-shadow: 0 6px 28px rgba(192,53,106,.20), 0 2px 8px rgba(192,53,106,.10);
      transform: translateY(-1px);
    }
    .folder-header:active { transform:scale(.997) translateY(0); }
    .folder-header.open {
      border-color: var(--rose);
      border-left-color: var(--rose-dk);
      border-bottom-left-radius:0; border-bottom-right-radius:0;
      background: linear-gradient(135deg, #ffe8f0 0%, #ffdde8 60%, #fff0f8 100%);
      box-shadow: 0 6px 28px rgba(192,53,106,.22);
    }
    .folder-left { display:flex; align-items:center; gap:12px; }
    .folder-gem { color:var(--rose); font-size:12px; }
    .folder-brand-name {
      font-family:'Playfair Display', serif; font-size:1.02rem; font-weight:600;
      color:var(--text); letter-spacing:.04em;
    }
    .folder-header.open .folder-brand-name {
      background:linear-gradient(135deg, var(--rose-dk), var(--rose), var(--gold));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .folder-count {
      font-size:.58rem; color:var(--rose); letter-spacing:.1em; margin-left:2px;
      background:rgba(192,53,106,.10); padding:2px 8px; border-radius:999px;
      border:1px solid rgba(192,53,106,.25); font-weight:700;
    }
    .folder-header.open .folder-count { background:rgba(192,53,106,.18); border-color:var(--rose); }
    .folder-arrow {
      color:var(--rose); font-size:.8rem; line-height:1;
      transition:transform .3s cubic-bezier(.4,0,.2,1), color .2s;
      font-weight:700;
    }
    .folder-header.open .folder-arrow { transform:rotate(90deg); color:var(--rose-dk); }

    .folder-body {
      max-height:0; overflow:hidden;
      transition:max-height .45s cubic-bezier(.4,0,.2,1);
      border:1.5px solid var(--rose); border-top:none;
      border-bottom-left-radius:10px; border-bottom-right-radius:10px;
    }
    .folder-body.open { max-height:4000px; }

    /* ── Perfumes grid ── */
    .perfumes-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(88px, 1fr));
      gap:18px 10px; padding:20px 18px 22px;
      background: linear-gradient(160deg, #fff8fb 0%, #fff4f0 100%);
      border:none;
    }

    /* ── Perfume chunk ── */
    .perf-chunk {
      display:flex; flex-direction:column; align-items:center; gap:7px;
      cursor:pointer; padding:10px 4px; border-radius:12px;
      transition:background .2s, transform .15s, box-shadow .2s;
    }
    .perf-chunk:hover {
      background: linear-gradient(160deg, rgba(255,220,235,.50) 0%, rgba(255,240,220,.40) 100%);
      transform:translateY(-3px);
      box-shadow:0 8px 20px rgba(192,53,106,.14);
    }
    .perf-chunk:active { transform:scale(.95); }
    .chunk-name {
      font-size:.64rem; text-align:center; color:var(--text);
      font-family:'Playfair Display', serif; line-height:1.3;
      width:88px; overflow:hidden; display:-webkit-box;
      -webkit-line-clamp:2; -webkit-box-orient:vertical;
    }
    .chunk-circle {
      width:78px; height:78px; border-radius:50%;
      overflow:hidden; border:2px solid var(--bdr2);
      background:var(--surf); display:flex; align-items:center; justify-content:center;
      transition:border-color .22s, box-shadow .22s; position:relative; flex-shrink:0;
      box-shadow: 0 2px 8px rgba(192,53,106,.10);
    }
    .perf-chunk:hover .chunk-circle {
      border-color:var(--rose);
      box-shadow: 0 0 0 3px rgba(192,53,106,.18), 0 6px 20px rgba(192,53,106,.30);
    }
    .chunk-circle img { width:100%; height:100%; object-fit:cover; }
    .chunk-emoji { font-size:34px; line-height:1; }
    .chunk-oos-ring { position:absolute; inset:0; background:rgba(255,255,255,.75); border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .chunk-oos-text { color:#C02040; font-size:.38rem; font-weight:700; letter-spacing:.2em; text-transform:uppercase; border:1px solid #C02040; padding:2px 5px; border-radius:2px; }
    .chunk-price { font-size:.62rem; color:var(--rose-dk); font-weight:700; letter-spacing:.04em; }
    .chunk-price.sale { color:#C02848; }

    /* ── No results ── */
    .no-results { text-align:center; padding:60px 24px; color:var(--muted); font-style:italic; }
    .no-results-icon { font-size:44px; margin-bottom:14px; }

    /* ── Product detail modal ── */
    .detail-overlay {
      position:fixed; inset:0; background:rgba(140,30,60,.28);
      backdrop-filter:blur(10px); z-index:200;
      display:none; align-items:flex-end; justify-content:center;
    }
    .detail-overlay.open { display:flex; }
    .detail-panel {
      background:#fff; border-top:3px solid var(--rose);
      width:100%; max-width:500px; max-height:92vh; overflow-y:auto;
      border-radius:20px 20px 0 0;
      animation:slideUp .3s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 -8px 40px rgba(192,53,106,.22);
    }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .detail-drag-handle { width:40px; height:4px; background:var(--bdr); border-radius:2px; margin:8px auto 0; }
    .detail-close-row { display:flex; justify-content:flex-end; padding:4px 12px 0; }
    .detail-close { background:var(--card2); border:1.5px solid var(--bdr); color:var(--rose); width:28px; height:28px; cursor:pointer; font-size:13px; border-radius:50%; transition:background .2s, border-color .2s; }
    .detail-close:hover { background:var(--rose); color:#fff; border-color:var(--rose); }
    .detail-img-wrap { position:relative; aspect-ratio:1; background:linear-gradient(160deg,#fff5f8,#fff8f0); max-height:360px; overflow:hidden; }
    .detail-img { width:100%; height:100%; object-fit:cover; }
    .detail-emoji-wrap { display:flex; align-items:center; justify-content:center; height:300px; background:linear-gradient(160deg,#fff0f5,#fff8ee); }
    .detail-emoji-big { font-size:120px; line-height:1; filter:drop-shadow(0 10px 28px rgba(192,53,106,.30)); }
    .detail-oos-overlay { position:absolute; inset:0; background:rgba(255,255,255,.72); display:flex; align-items:center; justify-content:center; }
    .detail-oos-label { color:#C02040; font-size:.64rem; font-weight:700; letter-spacing:.28em; text-transform:uppercase; border:2px solid #C02040; padding:6px 16px; border-radius:4px; }
    .detail-info { padding:12px 16px 20px; }
    .detail-badge {
      display:inline-block; color:#fff; font-size:.52rem; font-weight:700;
      letter-spacing:.18em; text-transform:uppercase; padding:3px 10px; margin-bottom:7px; border-radius:20px;
      background: linear-gradient(135deg, var(--rose-dk), var(--rose));
      box-shadow: 0 2px 10px rgba(192,53,106,.35);
    }
    .detail-name { font-family:'Playfair Display', serif; font-size:1.3rem; font-weight:700; line-height:1.2; color:var(--text); }
    .detail-brand { font-size:.60rem; color:var(--rose); letter-spacing:.18em; text-transform:uppercase; margin-top:3px; font-weight:600; }
    .detail-orn { height:2px; margin:10px 0; background:linear-gradient(90deg,transparent,var(--rose-lt),var(--gold-lt),transparent); border-radius:1px; }
    .detail-desc { font-size:.78rem; color:var(--muted); line-height:1.60; font-style:italic; }
    .detail-price-row { margin-top:10px; display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
    .detail-price {
      font-family:'Playfair Display', serif; font-size:1.3rem; font-weight:700;
      background:linear-gradient(135deg, var(--gold-dk), var(--gold), var(--gold-lt));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .detail-price-sale { font-family:'Playfair Display', serif; font-size:1.3rem; font-weight:700; color:#C02848; }
    .detail-price-orig { text-decoration:line-through; color:var(--muted); font-size:.82rem; }
    .detail-size { font-size:.62rem; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; margin-top:6px; }
    .detail-add-btn {
      width:100%; margin-top:20px;
      background: linear-gradient(180deg, #F05880 0%, #C0306A 55%, #A02055 100%);
      color:#fff; border:none; padding:17px; border-radius:12px;
      font-size:.76rem; font-weight:700; letter-spacing:.22em; text-transform:uppercase;
      cursor:pointer; font-family:'Lato', sans-serif;
      position:relative; overflow:hidden;
      box-shadow:
        0 7px 0 #7A0830,
        0 9px 2px rgba(0,0,0,.18),
        0 12px 24px rgba(192,53,106,.38);
      transform: translateY(0);
      transition: transform .1s ease, box-shadow .1s ease, background .3s ease;
    }
    /* top shine layer */
    .detail-add-btn::before {
      content:''; position:absolute; inset:0; border-radius:12px;
      background: linear-gradient(180deg, rgba(255,255,255,.22) 0%, rgba(255,255,255,0) 45%);
      pointer-events:none;
    }
    /* shimmer sweep */
    .detail-add-btn::after {
      content:''; position:absolute; top:-60%; left:-80%;
      width:50%; height:220%;
      background: rgba(255,255,255,.16);
      transform: skewX(-22deg);
      transition: left .55s ease;
      pointer-events:none;
    }
    .detail-add-btn:hover::after { left:130%; }
    .detail-add-btn:hover {
      transform: translateY(-2px);
      box-shadow:
        0 9px 0 #7A0830,
        0 11px 2px rgba(0,0,0,.18),
        0 16px 32px rgba(192,53,106,.48);
    }
    .detail-add-btn:active {
      transform: translateY(6px);
      box-shadow:
        0 1px 0 #7A0830,
        0 2px 2px rgba(0,0,0,.15),
        0 4px 10px rgba(192,53,106,.22);
    }
    .detail-add-btn.btn-success {
      background: linear-gradient(180deg, #5DE898 0%, #28A060 55%, #1A7840 100%) !important;
      box-shadow:
        0 7px 0 #0A5028,
        0 9px 2px rgba(0,0,0,.18),
        0 12px 24px rgba(40,160,96,.38) !important;
      pointer-events:none;
      animation: btn-success-pop .25s cubic-bezier(.36,.07,.19,.97);
    }
    @keyframes btn-success-pop {
      0%  { transform:translateY(6px) scale(.97); }
      60% { transform:translateY(-3px) scale(1.02); }
      100%{ transform:translateY(0)   scale(1); }
    }
    .detail-add-btn:disabled:not(.btn-success) { opacity:.35; cursor:not-allowed; background:var(--bdr) !important; box-shadow:0 3px 0 #bbb, 0 5px 10px rgba(0,0,0,.08) !important; color:var(--muted); transform:none; }

    /* ── Cart ── */
    .cart-overlay { position:fixed; inset:0; background:rgba(140,30,60,.26); backdrop-filter:blur(10px); z-index:300; display:none; opacity:0; transition:opacity .3s; }
    .cart-overlay.open { display:block; opacity:1; }
    .cart-panel { position:fixed; right:0; top:0; bottom:0; width:100%; max-width:420px; background:#fff; border-left:3px solid var(--rose); display:flex; flex-direction:column; transform:translateX(100%); transition:transform .35s cubic-bezier(.4,0,.2,1); box-shadow:-8px 0 40px rgba(192,53,106,.18); }
    .cart-overlay.open .cart-panel { transform:none; }
    .cart-header { display:flex; align-items:center; justify-content:space-between; padding:20px 22px; border-bottom:2px solid var(--bdr2); background:linear-gradient(135deg,#fff5f8,#fff8f0); }
    .cart-title { font-family:'Playfair Display', serif; font-size:.95rem; letter-spacing:.2em; text-transform:uppercase; font-weight:600; color:var(--rose-dk); }
    .cart-title-orn { width:40px; height:2px; background:linear-gradient(90deg,var(--rose),var(--gold)); margin-top:5px; border-radius:1px; }
    .close-btn { background:var(--card2); border:1.5px solid var(--bdr); color:var(--rose); width:32px; height:32px; cursor:pointer; font-size:14px; border-radius:50%; transition:background .2s; }
    .close-btn:hover { background:var(--rose); color:#fff; }
    .cart-items { flex:1; overflow-y:auto; padding:12px 22px; }
    .cart-item { display:flex; align-items:flex-start; gap:12px; padding:14px 0; border-bottom:1px solid var(--bdr2); }
    .ci-info { flex:1; }
    .ci-name { font-size:.84rem; font-weight:700; margin-bottom:2px; color:var(--text); }
    .ci-detail { font-size:.64rem; color:var(--muted); }
    .ci-price { font-size:.90rem; color:var(--rose-dk); font-weight:700; white-space:nowrap; }
    .ci-del { background:none; border:none; color:var(--muted); font-size:17px; cursor:pointer; transition:color .2s; }
    .ci-del:hover { color:var(--red); }
    .cart-empty { text-align:center; padding:55px 22px; color:var(--muted); font-style:italic; }
    .cart-empty-icon { font-size:42px; margin-bottom:12px; }
    .cart-footer { padding:18px 22px; border-top:2px solid var(--bdr2); background:linear-gradient(135deg,#fff5f8,#fff8f0); }
    .cart-total { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .cart-total-lbl { font-size:.76rem; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); }
    .cart-total-val { font-family:'Playfair Display', serif; font-size:1.15rem; font-weight:700;
      background:linear-gradient(135deg,var(--rose-dk),var(--rose),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .order-btn { width:100%; background:linear-gradient(135deg,var(--rose-dk),var(--rose),#E86070); color:#fff; border:none; padding:16px; border-radius:8px; font-size:.76rem; font-weight:700; letter-spacing:.2em; text-transform:uppercase; cursor:pointer; font-family:'Lato', sans-serif; transition:opacity .2s, box-shadow .2s; box-shadow:0 4px 18px rgba(192,53,106,.38); }
    .order-btn:hover { opacity:.90; box-shadow:0 6px 28px rgba(192,53,106,.55); }

    /* ── Customer dialog ── */
    .customer-overlay { position:fixed; inset:0; background:rgba(140,30,60,.26); backdrop-filter:blur(10px); z-index:400; display:none; align-items:center; justify-content:center; }
    .customer-overlay.open { display:flex; }
    .customer-dialog { background:#fff; border:2px solid var(--bdr); border-top:4px solid var(--rose); padding:30px 26px; max-width:370px; width:90%; border-radius:16px; box-shadow:0 12px 48px rgba(192,53,106,.25); }
    .customer-dialog h3 { font-family:'Playfair Display', serif; font-size:1.05rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
      background:linear-gradient(135deg,var(--rose-dk),var(--rose),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      margin-bottom:18px; }
    .customer-input { width:100%; background:#F0D8F8; border:1.5px solid #D8A0E8; color:#1A0820; -webkit-text-fill-color:#1A0820; padding:11px 14px; font-size:.84rem; font-family:'Lato', sans-serif; outline:none; transition:border-color .2s, box-shadow .2s; margin-bottom:11px; border-radius:8px; }
    .customer-input:focus { border-color:#9B30C0; box-shadow:0 0 0 3px rgba(155,48,192,.15); background:#EAC8F8; }

  /* ── State ── */
  let searchText  = '';
  let openFolders = new Set();
  let cart        = {};

  /* ── Folder rendering ── */
  function renderFolders() {
    const container = document.getElementById('foldersContainer');
    const q = searchText.toLowerCase();

    const byBrand = {};
    brands.forEach(b => { byBrand[b] = []; });
    const unbranded = [];
    const unknown   = {};

    products.forEach(p => {
      const okS = !q
        || (p.name  ||'').toLowerCase().includes(q)
        || (p.desc  ||'').toLowerCase().includes(q)
        || (p.brand ||'').toLowerCase().includes(q);
      if (!okS) return;
      const b = p.brand || '';
      if (!b) { unbranded.push(p); return; }
      const key = brands.find(x => x.toLowerCase() === b.toLowerCase());
      if (key) byBrand[key].push(p);
      else { if (!unknown[b]) unknown[b] = []; unknown[b].push(p); }
    });

    let html = '';
    brands.forEach(b => {
      const prods = byBrand[b] || [];
      if (q && !prods.length) return;
      html += buildFolder(b, prods);
    });
    Object.keys(unknown).forEach(b => {
      const prods = unknown[b];
      if (q && !prods.length) return;
      html += buildFolder(b, prods);
    });
    if (!q || unbranded.length) {
      if (unbranded.length) html += buildFolder('__unbranded__', unbranded);
    }

    if (!html) {
      html = '<div class="no-results"><div class="no-results-icon">🔍</div><p>No se encontraron perfumes</p></div>';
    }
    container.innerHTML = html;
  }

  function buildFolder(brandKey, prods) {
    const displayName = brandKey === '__unbranded__' ? 'Sin Marca' : brandKey;
    const safeId = 'f_' + brandKey.replace(/[^a-zA-Z0-9]/g, '_');
    const isOpen = openFolders.has(brandKey) || (searchText && prods.length > 0);

    const chunks = prods.map(p => {
      const oos = p.inStock === false;
      const circContent = p.image
        ? `<img src="${p.image}" alt="${p.name}" loading="lazy">`
        : `<span class="chunk-emoji">${p.icon || '🌹'}</span>`;
      const oosH = oos
        ? `<div class="chunk-oos-ring"><div class="chunk-oos-text">Agotado</div></div>`
        : '';
      const priceVal = p.salePrice ? p.salePrice : p.price;
      const priceClass = p.salePrice ? 'chunk-price sale' : 'chunk-price';
      return `<div class="perf-chunk" onclick="showDetail(${p.id})">
        <div class="chunk-name">${p.name}</div>
        <div class="chunk-circle">${circContent}${oosH}</div>
        <div class="${priceClass}">${CURRENCY}${Number(priceVal).toLocaleString('es-CO')}</div>
      </div>`;
    }).join('');

    const emptyH = prods.length === 0
      ? `<div class="perfumes-grid" style="color:var(--muted);font-style:italic;font-size:.75rem;padding:16px;">Sin productos</div>`
      : `<div class="perfumes-grid">${chunks}</div>`;

    return `<div class="brand-folder">
      <div class="folder-header ${isOpen ? 'open' : ''}" onclick="toggleFolder('${brandKey.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
        <div class="folder-left">
          <span class="folder-gem">◈</span>
          <span class="folder-brand-name">${displayName}</span>
          <span class="folder-count">${prods.length} perfume${prods.length !== 1 ? 's' : ''}</span>
        </div>
        <span class="folder-arrow">›</span>
      </div>
      <div class="folder-body ${isOpen ? 'open' : ''}" id="${safeId}">${emptyH}</div>
    </div>`;
  }

  function toggleFolder(brandKey) {
    if (openFolders.has(brandKey)) openFolders.delete(brandKey);
    else openFolders.add(brandKey);
    renderFolders();
  }

  function onSearch(v) { searchText = v.trim(); renderFolders(); }

  /* ── Product detail ── */
  function showDetail(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    const oos = p.inStock === false;

    const imgH = p.image
      ? `<img src="${p.image}" alt="${p.name}" class="detail-img">`
      : `<div class="detail-emoji-wrap"><span class="detail-emoji-big">${p.icon || '🌹'}</span></div>`;
    const oosH = oos ? `<div class="detail-oos-overlay"><div class="detail-oos-label">Agotado</div></div>` : '';

    const priceH = p.salePrice
      ? `<span class="detail-price-sale">${CURRENCY}${Number(p.salePrice).toLocaleString('es-CO')}</span>
         <span class="detail-price-orig">${CURRENCY}${Number(p.price).toLocaleString('es-CO')}</span>`
      : `<span class="detail-price">${CURRENCY}${Number(p.price).toLocaleString('es-CO')}</span>`;

    const addBtn = oos
      ? `<button class="detail-add-btn" disabled>Agotado</button>`
      : `<button class="detail-add-btn" id="detailAddBtn" onclick="addToCartFromDetail(${p.id})">Agregar al Carrito</button>`;

    document.getElementById('detailBody').innerHTML = `
      <div class="detail-img-wrap">${imgH}${oosH}</div>
      <div class="detail-info">
        ${p.badge ? `<div class="detail-badge">${p.badge}</div>` : ''}
        <div class="detail-name">${p.name}</div>
        ${p.brand ? `<div class="detail-brand">${p.brand}</div>` : ''}
        <div class="detail-orn"></div>
        ${p.desc ? `<div class="detail-desc">${p.desc}</div>` : ''}
        <div class="detail-price-row">${priceH}</div>
        ${p.size ? `<div class="detail-size">${p.size}</div>` : ''}
        ${addBtn}
      </div>`;
    document.getElementById('detailOverlay').classList.add('open');
  }

  function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); }
  function onDetailOverlayClick(e) { if (e.target === document.getElementById('detailOverlay')) closeDetail(); }

  function addToCartFromDetail(id) {
    const p = products.find(x => x.id === id);
    if (!p || p.inStock === false) return;
    const btn = document.getElementById('detailAddBtn');
    if (!btn || btn.disabled) return;

    btn.disabled = true;
    /* force 3D press frame */
    btn.style.transform = 'translateY(6px)';
    btn.style.boxShadow = '0 1px 0 #7A0830, 0 2px 2px rgba(0,0,0,.15), 0 4px 10px rgba(192,53,106,.22)';

    const srcEl = document.querySelector('#detailBody .detail-img-wrap, #detailBody .detail-emoji-wrap');

    setTimeout(() => {
      /* release → success */
      btn.style.transform = '';
      btn.style.boxShadow = '';
      btn.classList.add('btn-success');
      btn.innerHTML = '✓ &nbsp; AGREGADO';

      cart[id] = (cart[id] || 0) + 1;
      updateCartUI();
      flyToCart(srcEl);

      setTimeout(() => closeDetail(), 820);
    }, 160);
  }

  /* ── Fly-to-cart animation ── */
  function flyToCart(srcEl) {
    const cartBtn = document.querySelector('.cart-toggle');
    if (!srcEl || !cartBtn) return;

    const srcRect = srcEl.getBoundingClientRect();
    const dstRect = cartBtn.getBoundingClientRect();

    const size = 52;
    const x0 = srcRect.left + srcRect.width  / 2 - size / 2;
    const y0 = srcRect.top  + srcRect.height / 2 - size / 2;
    const x1 = dstRect.left + dstRect.width  / 2 - size / 2;
    const y1 = dstRect.top  + dstRect.height / 2 - size / 2;

    /* clone the product image or fall back to a gold circle */
    let ball;
    const img = srcEl.querySelector('img');
    if (img) {
      ball = document.createElement('div');
      ball.style.cssText = `background:url('${img.src}') center/cover;`;
    } else {
      const em = srcEl.querySelector('.detail-emoji-big');
      ball = document.createElement('div');
      ball.style.cssText = `font-size:28px;display:flex;align-items:center;justify-content:center;background:var(--surf);`;
      ball.textContent = em ? em.textContent : '🌹';
    }
    ball.style.cssText += `
      position:fixed; left:${x0}px; top:${y0}px;
      width:${size}px; height:${size}px;
      border-radius:50%; overflow:hidden;
      border:2px solid var(--gold);
      box-shadow:0 0 18px rgba(201,168,76,.55);
      z-index:9999; pointer-events:none;
    `;
    document.body.appendChild(ball);

    /* arc midpoint — curves upward between src and dest */
    const mx = (x0 + x1) / 2;
    const my = Math.min(y0, y1) - 140;

    ball.animate([
      { left:`${x0}px`, top:`${y0}px`, transform:'scale(1)',    opacity:1   },
      { left:`${mx}px`, top:`${my}px`, transform:'scale(0.65)', opacity:0.9 },
      { left:`${x1}px`, top:`${y1}px`, transform:'scale(0.1)',  opacity:0   }
    ], { duration:680, easing:'cubic-bezier(.4,0,.2,1)', fill:'forwards' })
    .onfinish = () => {
      ball.remove();
      /* cart button bounce */
      cartBtn.animate([
        { transform:'scale(1)'    },
        { transform:'scale(1.28)' },
        { transform:'scale(0.9)'  },
        { transform:'scale(1.1)'  },
        { transform:'scale(1)'    }
      ], { duration:380, easing:'ease-out' });
    };
  }

  /* ── Cart ── */
  function addToCart(id) {
    const p = products.find(x => x.id === id);
    if (!p || p.inStock === false) return;
    cart[id] = (cart[id] || 0) + 1;
    updateCartUI();
  }

  function removeFromCart(id) { delete cart[id]; updateCartUI(); }

  function updateCartUI() {
    const total = Object.entries(cart).reduce((s, [id, q]) => {
      const p = products.find(x => x.id == id);
      return s + (p ? (p.salePrice || p.price) * q : 0);
    }, 0);
    const count = Object.values(cart).reduce((a, b) => a + b, 0);
    const cntEl = document.getElementById('cartCount');
    cntEl.textContent = count;
    cntEl.style.display = count ? 'inline-flex' : 'none';
    const items  = document.getElementById('cartItems');
    const footer = document.getElementById('cartFooter');
    document.getElementById('cartTotal').textContent = CURRENCY + total.toLocaleString('es-CO');
    if (!count) {
      items.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛍</div><p>Tu carrito está vacío</p></div>`;
      footer.style.display = 'none'; return;
    }
    footer.style.display = '';
    items.innerHTML = Object.entries(cart).map(([id, qty]) => {
      const p = products.find(x => x.id == id); if (!p) return '';
      return `<div class="cart-item">
        <div class="ci-info">
          <div class="ci-name">${p.name} <small style="color:var(--muted)">×${qty}</small></div>
          <div class="ci-detail">${p.size || ''}${p.brand ? ' · ' + p.brand : ''}</div>
        </div>
        <div class="ci-price">${CURRENCY}${((p.salePrice || p.price) * qty).toLocaleString('es-CO')}</div>
        <button class="ci-del" onclick="removeFromCart(${id})">×</button>
      </div>`;
    }).join('');
  }

  function toggleCart() {
    const ov = document.getElementById('cartOverlay');
    ov.classList.toggle('open');
    if (ov.classList.contains('open')) updateCartUI();
  }
  function closeCartOutside(e) { if (e.target === document.getElementById('cartOverlay')) toggleCart(); }

  /* ── WhatsApp order ── */
  function placeOrder() {
    if (!Object.keys(cart).length) return;
    document.getElementById('customerOverlay').classList.add('open');
    setTimeout(() => document.getElementById('customerName').focus(), 100);
  }
  function closeCustomerDialog() { document.getElementById('customerOverlay').classList.remove('open'); }
  function confirmOrder() {
    const name  = document.getElementById('customerName').value.trim();
    const phone = document.getElementById('customerPhone').value.trim();
    if (!name) { document.getElementById('customerName').focus(); return; }
    closeCustomerDialog();
    const items = []; let total = 0;
    Object.entries(cart).forEach(([id, qty]) => {
      const p = products.find(x => x.id == id);
      if (p) { const price = p.salePrice || p.price; items.push({ name: p.name, size: p.size, qty, subtotal: price * qty }); total += price * qty; }
    });
    let msg = `🌹 *Pedido — ${STORE_NAME}*\n\n`;
    msg += `👤 *${name}*${phone ? '\n📞 ' + phone : ''}\n\n`;
    items.forEach(i => { msg += `▪ ${i.name} (${i.size}) × ${i.qty} = ${CURRENCY}${i.subtotal.toLocaleString('es-CO')}\n`; });
    msg += `\n*Total: ${CURRENCY}${total.toLocaleString('es-CO')}*\n\n_Enviado desde la tienda web_`;
    if (ws && ws.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ type: 'order', name, phone, city: '', items, total: total.toLocaleString('es-CO') }));
    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
  }

  /* ── Theme ── */
  function toggleTheme() {
    const isDark = document.body.classList.toggle('dark');
    document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
    localStorage.setItem('ydf_theme', isDark ? 'dark' : 'light');
  }

  /* ── WebSocket ── */
  let ws = null, wsDelay = 2000;
  function wsConnect() {
    try { ws = new WebSocket(WS_URL); } catch(e) { setTimeout(wsConnect, wsDelay); return; }
    ws.onopen  = () => { setDot('conn', 'Conectado'); wsDelay = 2000; };
    ws.onmessage = e => {
      try {
        const m = JSON.parse(e.data);
        if (m.type === 'products' || m.type === 'state') {
          if (Array.isArray(m.products) && m.products.length) products = m.products;
          if (Array.isArray(m.brands) && m.brands.length) brands = m.brands;
          renderFolders(); setDot('live', 'En vivo');
        }
      } catch(e2) {}
    };
    ws.onclose = () => { setDot('', 'Desconectado'); setTimeout(wsConnect, wsDelay = Math.min(wsDelay * 1.5, 30000)); };
    ws.onerror = () => { setDot('', 'Sin conexión'); };
  }
  function setDot(cls, lbl) {
    const d = document.getElementById('wsDot'), l = document.getElementById('wsLabel');
    d.className = 'ws-dot ' + cls; l.textContent = lbl;
    l.style.color = cls === 'live' ? 'var(--green)' : cls === 'conn' ? 'var(--gold)' : 'var(--muted)';
  }

  /* ── Init ── */
  if (localStorage.getItem('ydf_theme') === 'dark') {
    document.body.classList.add('dark');
    document.getElementById('themeBtn').textContent = '☀️';
  }
  renderFolders();
  wsConnect();

  /* fullscreen on first touch (mobile) */
  function tryFullscreen() {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
    if (req) req.call(el).catch(() => {});
  }
  document.addEventListener('touchstart', tryFullscreen, { once: true });
</script>
