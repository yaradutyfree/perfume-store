<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oud & Roses — Luxury Arabic Perfumes</title>
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --dark: #0e0e0e;
      --dark2: #181818;
      --dark3: #222;
      --card: #1c1c1c;
      --border: #2e2e2e;
      --text: #f0ead6;
      --muted: #888;
      --whatsapp: #25d366;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Georgia', serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--dark2);
      border-bottom: 1px solid var(--border);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-name {
      font-size: 1.35rem;
      color: var(--gold);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .logo-sub {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .cart-btn {
      background: none;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }

    .cart-btn:hover { background: rgba(201,168,76,0.1); }

    .cart-count {
      background: var(--gold);
      color: var(--dark);
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: bold;
      font-family: sans-serif;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 48px 20px 36px;
      background: linear-gradient(180deg, #181818 0%, #0e0e0e 100%);
      border-bottom: 1px solid var(--border);
    }

    .hero-ornament {
      color: var(--gold);
      font-size: 1.4rem;
      letter-spacing: 8px;
      margin-bottom: 12px;
    }

    .hero h1 {
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      color: var(--gold-light);
      font-weight: normal;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .hero p {
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 1px;
      max-width: 340px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── SECTION TITLE ── */
    .section-title {
      text-align: center;
      padding: 32px 20px 12px;
    }

    .section-title h2 {
      font-size: 0.75rem;
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: var(--gold);
      margin: 10px auto 0;
      opacity: 0.5;
    }

    /* ── PRODUCT GRID ── */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      padding: 20px 16px 40px;
      max-width: 800px;
      margin: 0 auto;
    }

    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }

    .product-card:hover {
      border-color: var(--gold);
      transform: translateY(-2px);
    }

    .product-img {
      width: 100%;
      aspect-ratio: 1;
      background: var(--dark3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      position: relative;
      overflow: hidden;
    }

    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--gold);
      color: var(--dark);
      font-size: 0.6rem;
      font-family: sans-serif;
      font-weight: bold;
      padding: 2px 7px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .product-info {
      padding: 12px;
    }

    .product-name {
      font-size: 0.9rem;
      color: var(--text);
      margin-bottom: 3px;
      letter-spacing: 0.5px;
    }

    .product-desc {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 10px;
      font-style: italic;
      line-height: 1.5;
    }

    .product-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .product-price {
      font-size: 1rem;
      color: var(--gold);
      font-weight: bold;
    }

    .product-price span {
      font-size: 0.65rem;
      color: var(--muted);
      font-weight: normal;
    }

    .add-btn {
      background: var(--gold);
      color: var(--dark);
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      font-family: sans-serif;
      line-height: 1;
    }

    .add-btn:active { transform: scale(0.9); }
    .add-btn:hover { background: var(--gold-light); }

    /* ── CART DRAWER ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
    }

    .overlay.open { display: block; }

    .cart-drawer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--dark2);
      border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      z-index: 201;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
    }

    .cart-drawer.open { transform: translateY(0); }

    .cart-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 0;
      flex-shrink: 0;
    }

    .cart-header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .cart-header h3 {
      color: var(--gold);
      font-size: 1rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.4rem;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px;
    }

    .cart-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .cart-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .cart-item-icon {
      font-size: 1.8rem;
      width: 42px;
      text-align: center;
      flex-shrink: 0;
    }

    .cart-item-details { flex: 1; }

    .cart-item-name {
      font-size: 0.9rem;
      color: var(--text);
    }

    .cart-item-price {
      font-size: 0.8rem;
      color: var(--gold);
    }

    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-btn {
      background: var(--dark3);
      border: 1px solid var(--border);
      color: var(--text);
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      line-height: 1;
      transition: background 0.15s;
    }

    .qty-btn:hover { background: var(--border); }

    .qty-num {
      font-size: 0.95rem;
      min-width: 20px;
      text-align: center;
      font-family: sans-serif;
    }

    /* ── ORDER FORM ── */
    .order-form {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .order-form h4 {
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .form-input {
      flex: 1;
      background: var(--dark3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus { border-color: var(--gold); }
    .form-input::placeholder { color: var(--muted); }

    .cart-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0 12px;
    }

    .total-label {
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .total-amount {
      font-size: 1.2rem;
      color: var(--gold);
      font-weight: bold;
    }

    .wa-order-btn {
      width: 100%;
      background: var(--whatsapp);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: bold;
      letter-spacing: 0.5px;
      transition: opacity 0.2s;
      margin-bottom: 8px;
    }

    .wa-order-btn:hover { opacity: 0.9; }
    .wa-order-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .wa-icon {
      width: 22px;
      height: 22px;
      fill: #fff;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 30px 20px;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 2px;
      border-top: 1px solid var(--border);
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--gold);
      color: var(--dark);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-family: sans-serif;
      font-weight: bold;
      z-index: 300;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (min-width: 500px) {
      .cart-drawer {
        max-width: 480px;
        left: 50%;
        right: auto;
        transform: translateX(-50%) translateY(100%);
        border-radius: 16px 16px 0 0;
      }
      .cart-drawer.open { transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="logo">
    <span class="logo-name">Oud &amp; Roses</span>
    <span class="logo-sub">Luxury Arabic Perfumes</span>
  </div>
  <button class="cart-btn" onclick="openCart()">
    🛒
    <div class="cart-count" id="cartCount">0</div>
  </button>
</header>

<!-- ── HERO ── -->
<div class="hero">
  <div class="hero-ornament">— ✦ —</div>
  <h1>The Essence of the East</h1>
  <p>Rare oud, rose, amber &amp; musk — crafted for those who wear their story</p>
</div>

<!-- ── PRODUCTS ── -->
<div class="section-title">
  <h2>Our Collection</h2>
  <div class="divider"></div>
</div>

<div class="products" id="productsGrid"></div>

<!-- ── FOOTER ── -->
<footer>OUD &amp; ROSES &nbsp;·&nbsp; ORDER VIA WHATSAPP</footer>

<!-- ── OVERLAY ── -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>

<!-- ── CART DRAWER ── -->
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-handle"></div>
  <div class="cart-header">
    <h3>Your Order</h3>
    <button class="close-btn" onclick="closeCart()">×</button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="cart-empty">Your cart is empty</div>
  </div>
  <div class="order-form">
    <h4>Your Details</h4>
    <div class="form-row">
      <input class="form-input" id="customerName" type="text" placeholder="Your name" />
    </div>
    <div class="form-row">
      <input class="form-input" id="customerCity" type="text" placeholder="City / Area" />
    </div>
    <div class="cart-total">
      <span class="total-label">Total</span>
      <span class="total-amount" id="totalAmount">$0.00</span>
    </div>
    <button class="wa-order-btn" id="waOrderBtn" onclick="sendWhatsAppOrder()" disabled>
      <svg class="wa-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Order via WhatsApp
    </button>
  </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script>
  // ── CONFIGURATION ──────────────────────────────────────────────
  // IMPORTANT: Replace with your WhatsApp number (include country code, no + or spaces)
  const WHATSAPP_NUMBER = "573144613936";

  // Your store name (shown in WhatsApp message)
  const STORE_NAME = "Oud & Roses";

  // Currency symbol
  const CURRENCY = "$";

  // ── PRODUCTS ───────────────────────────────────────────────────
  const products = [
    {
      id: 1,
      name: "Yara 2",
      desc: "Damascene rose meets aged oud",
      price: 130.000,
      size: "100ml",
      icon: "🌹",
      badge: "Best Seller",
      image: "images/yara.webp"
    },
    {
      id: 2,
      name: "Amber Nights",
      desc: "Warm amber, vanilla, sandalwood",
      price: 55,
      size: "100ml",
      icon: "🔶",
      badge: null,
      image: null
    },
    {
      id: 3,
      name: "Royal Musk",
      desc: "White musk with light oud smoke",
      price: 40,
      size: "50ml",
      icon: "🤍",
      badge: null,
      image: null
    },
    {
      id: 4,
      name: "Desert Wind",
      desc: "Saffron, oud, earthy spices",
      price: 65,
      size: "100ml",
      icon: "🌵",
      badge: "New",
      image: null
    },
    {
      id: 5,
      name: "Jasmine Gold",
      desc: "Jasmine, neroli, gold amber",
      price: 50,
      size: "75ml",
      icon: "🌸",
      badge: null,
      image: null
    },
    {
      id: 6,
      name: "Black Oud",
      desc: "Deep, smoky, pure aged oud",
      price: 80,
      size: "50ml",
      icon: "⬛",
      badge: "Exclusive",
      image: null
    }

  ];

  // ── STATE ───────────────────────────────────────────────────────
  let cart = {};

  // ── RENDER PRODUCTS ─────────────────────────────────────────────
  function renderProducts() {
    const grid = document.getElementById("productsGrid");
    grid.innerHTML = products.map(p => `
      <div class="product-card">
        <div class="product-img">
          ${p.image ? `<img src="${p.image}" alt="${p.name}" />` : `${p.image ? `<img src="${p.image}" alt="${p.name}" />` : `${p.image ? `<img src="${p.image}" alt="${p.name}" />` : `${p.image ? `<img src="${p.image}" alt="${p.name}" />` : `${p.image ? `<img src="${p.image}" alt="${p.name}" />` : `${p.image ? `<img src="${p.image}" alt="${p.name}" />` : `${p.image ? `<img src="${p.image}" alt="${p.name}" />` : `${p.image ? `<img src="${p.image}" alt="${p.name}" />` : `${p.image ? `<img src="${p.image}" alt="${p.name}" />` : `${p.image ? `<img src="${p.image}" alt="${p.name}" />` : `${p.image ? `<img src="${p.image}" alt="${p.name}" />` : `<span>${p.icon}</span>`}`}`}`}`}`}`}`}`}`}`}
          ${p.badge ? `<div class="product-badge">${p.badge}</div>` : ""}
        </div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-desc">${p.desc}</div>
          <div class="product-footer">
            <div class="product-price">
              ${CURRENCY}${p.price} <span>/ ${p.size}</span>
            </div>
            <button class="add-btn" onclick="addToCart(${p.id})" title="Add to cart">+</button>
          </div>
        </div>
      </div>
    `).join("");
  }

  // ── CART LOGIC ──────────────────────────────────────────────────
  function addToCart(id) {
    cart[id] = (cart[id] || 0) + 1;
    updateCartUI();
    const p = products.find(x => x.id === id);
    showToast(`${p.name} added`);
  }

  function changeQty(id, delta) {
    cart[id] = (cart[id] || 0) + delta;
    if (cart[id] <= 0) delete cart[id];
    updateCartUI();
  }

  function updateCartUI() {
    const total = Object.entries(cart).reduce((sum, [id, qty]) => {
      const p = products.find(x => x.id == id);
      return sum + (p ? p.price * qty : 0);
    }, 0);

    const count = Object.values(cart).reduce((s, q) => s + q, 0);
    document.getElementById("cartCount").textContent = count;
    document.getElementById("totalAmount").textContent = `${CURRENCY}${total.toFixed(2)}`;

    const btn = document.getElementById("waOrderBtn");
    btn.disabled = count === 0;

    const itemsEl = document.getElementById("cartItems");
    if (count === 0) {
      itemsEl.innerHTML = `<div class="cart-empty">Your cart is empty</div>`;
      return;
    }

    itemsEl.innerHTML = Object.entries(cart).map(([id, qty]) => {
      const p = products.find(x => x.id == id);
      if (!p) return "";
      return `
        <div class="cart-item">
          <div class="cart-item-icon">${p.icon}</div>
          <div class="cart-item-details">
            <div class="cart-item-name">${p.name} (${p.size})</div>
            <div class="cart-item-price">${CURRENCY}${(p.price * qty).toFixed(2)}</div>
          </div>
          <div class="cart-item-qty">
            <button class="qty-btn" onclick="changeQty(${p.id}, -1)">−</button>
            <span class="qty-num">${qty}</span>
            <button class="qty-btn" onclick="changeQty(${p.id}, 1)">+</button>
          </div>
        </div>
      `;
    }).join("");
  }

  // ── CART DRAWER ──────────────────────────────────────────────────
  function openCart() {
    document.getElementById("cartDrawer").classList.add("open");
    document.getElementById("overlay").classList.add("open");
  }

  function closeCart() {
    document.getElementById("cartDrawer").classList.remove("open");
    document.getElementById("overlay").classList.remove("open");
  }

  // ── WHATSAPP ORDER ───────────────────────────────────────────────
  function sendWhatsAppOrder() {
    const name = document.getElementById("customerName").value.trim();
    const city = document.getElementById("customerCity").value.trim();

    if (!name) {
      document.getElementById("customerName").focus();
      showToast("Please enter your name");
      return;
    }

    const lines = ["🌹 *New Order — " + STORE_NAME + "*\n"];

    let total = 0;
    Object.entries(cart).forEach(([id, qty]) => {
      const p = products.find(x => x.id == id);
      if (p) {
        const subtotal = p.price * qty;
        total += subtotal;
        lines.push(`• ${p.name} (${p.size}) × ${qty} = ${CURRENCY}${subtotal.toFixed(2)}`);
      }
    });

    lines.push(`\n💰 *Total: ${CURRENCY}${total.toFixed(2)}*`);
    lines.push(`\n👤 *Name:* ${name}`);
    if (city) lines.push(`📍 *City:* ${city}`);

    const message = encodeURIComponent(lines.join("\n"));
    const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${message}`;
    window.open(url, "_blank");
  }

  // ── TOAST ─────
