<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YaraDutyFree — Fragancias Árabes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:    #C9A84C;
      --gold-lt: #E8CB6A;
      --gold-dk: #9A7820;
      --bg:      #080808;
      --surf:    #0D0D0D;
      --card:    #111111;
      --card2:   #161616;
      --bdr:     #242424;
      --bdr2:    #1C1C1C;
      --text:    #F2EDD7;
      --muted:   #7A7460;
      --green:   #2DA05A;
      --red:     #9A2020;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .site-header {
      background: var(--surf);
      border-bottom: 1px solid var(--bdr);
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px;
      max-width: 1280px; margin: 0 auto;
    }
    .logo-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      background: linear-gradient(135deg, var(--gold-dk) 0%, var(--gold-lt) 50%, var(--gold-dk) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-tagline {
      font-size: .6rem; letter-spacing: .26em;
      color: var(--muted); text-transform: uppercase; margin-top: 3px;
    }
    .logo-orn {
      height: 1px; margin-top: 6px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: .35;
    }
    .header-right { display: flex; align-items: center; gap: 20px; }
    .ws-status { display: flex; align-items: center; gap: 6px; }
    .ws-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--red); transition: background .6s;
    }
    .ws-dot.live { background: var(--green); animation: blink 2.5s infinite; }
    .ws-dot.conn { background: var(--gold); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .ws-label { font-size: .68rem; color: var(--muted); letter-spacing: .08em; }
    .cart-toggle {
      display: flex; align-items: center; gap: 8px;
      background: transparent; border: 1px solid var(--bdr);
      color: var(--text); padding: 8px 18px;
      font-size: .72rem; letter-spacing: .12em; text-transform: uppercase;
      cursor: pointer; transition: border-color .2s, color .2s;
    }
    .cart-toggle:hover { border-color: var(--gold); color: var(--gold); }
    .cart-count {
      background: var(--gold); color: var(--bg);
      font-size: .6rem; font-weight: 700;
      min-width: 18px; height: 18px; border-radius: 50%;
      display: none; align-items: center; justify-content: center;
    }

    /* ── Ornamental divider ─────────────────────────────────── */
    .orn-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 28px 0; max-width: 1280px; margin: 0 auto;
    }
    .orn-row::before, .orn-row::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--bdr), transparent);
    }
    .orn-gem { color: var(--gold); font-size: 9px; opacity: .45; letter-spacing: 6px; }

    /* ── Filter bar ─────────────────────────────────────────── */
    .filters-wrap {
      background: var(--surf); border-bottom: 1px solid var(--bdr2);
      padding: 14px 28px;
    }
    .filters-inner { max-width: 1280px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

    .search-row { position: relative; }
    .search-ico {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none; font-size: 13px;
    }
    .search-input {
      width: 100%; max-width: 440px;
      background: var(--card); border: 1px solid var(--bdr);
      color: var(--text); padding: 9px 14px 9px 38px;
      font-size: .82rem; font-family: 'Lato', sans-serif;
      outline: none; transition: border-color .2s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--gold); }

    .brands-row {
      display: flex; gap: 6px;
      overflow-x: auto; scrollbar-width: none;
    }
    .brands-row::-webkit-scrollbar { display: none; }
    .brand-pill {
      flex-shrink: 0;
      background: transparent; border: 1px solid var(--bdr);
      color: var(--muted);
      padding: 5px 16px;
      font-size: .68rem; letter-spacing: .12em; text-transform: uppercase;
      cursor: pointer; white-space: nowrap;
      font-family: 'Lato', sans-serif;
      transition: all .2s;
    }
    .brand-pill:hover { border-color: var(--gold); color: var(--gold); }
    .brand-pill:focus { outline: none; }
    .brand-pill.active { background: var(--gold); border-color: var(--gold); color: var(--bg); font-weight: 700; }

    /* ── Section heading ────────────────────────────────────── */
    .section-head {
      text-align: center; padding: 26px 28px 4px;
      max-width: 1280px; margin: 0 auto;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight: 400;
      letter-spacing: .35em; text-transform: uppercase; color: var(--muted);
    }
    .section-count { font-size: .62rem; color: var(--bdr); margin-top: 4px; letter-spacing: .1em; }

    /* ── Products grid ──────────────────────────────────────── */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1px; padding: 16px 16px 60px;
      max-width: 1280px; margin: 0 auto;
    }

    /* ── Product card ───────────────────────────────────────── */
    .product-card {
      background: var(--card); border: 1px solid var(--bdr2);
      display: flex; flex-direction: column;
      transition: border-color .3s, box-shadow .3s;
      position: relative;
    }
    .product-card:hover {
      border-color: rgba(201,168,76,.4);
      box-shadow: 0 4px 28px rgba(0,0,0,.5), inset 0 0 0 1px rgba(201,168,76,.07);
      z-index: 1;
    }
    .prod-img-wrap {
      aspect-ratio: 1; background: var(--surf);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .prod-img { width: 100%; height: 100%; object-fit: cover; transition: transform .5s; }
    .product-card:hover .prod-img { transform: scale(1.05); }
    .prod-emoji { font-size: 68px; line-height: 1; filter: drop-shadow(0 6px 18px rgba(0,0,0,.6)); }

    .prod-badge {
      position: absolute; top: 0; left: 0;
      background: var(--gold); color: var(--bg);
      font-size: .54rem; font-weight: 700;
      letter-spacing: .18em; text-transform: uppercase;
      padding: 4px 10px;
    }
    .prod-brand-tag {
      position: absolute; top: 0; right: 0;
      background: rgba(8,8,8,.85);
      border-left: 1px solid var(--bdr); border-bottom: 1px solid var(--bdr);
      color: var(--muted);
      font-size: .56rem; letter-spacing: .12em; text-transform: uppercase;
      padding: 4px 8px;
    }

    .prod-info { padding: 16px 16px 6px; flex: 1; }
    .prod-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 6px;
    }
    .prod-desc { font-size: .72rem; color: var(--muted); line-height: 1.55; font-style: italic; }

    .prod-footer {
      display: flex; align-items: flex-end; justify-content: space-between;
      padding: 12px 16px 16px;
    }
    .prod-price {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold-dk), var(--gold-lt));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .prod-size { font-size: .6rem; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; margin-top: 3px; }

    .add-btn {
      background: transparent; border: 1px solid rgba(201,168,76,.5); color: var(--gold);
      padding: 8px 18px;
      font-size: .68rem; font-family: 'Lato', sans-serif;
      letter-spacing: .14em; text-transform: uppercase; cursor: pointer;
      transition: all .2s;
    }
    .add-btn:hover { background: var(--gold); color: var(--bg); border-color: var(--gold); }
    .add-btn:active { transform: scale(.97); }

    .empty-state {
      grid-column: 1/-1; text-align: center; padding: 80px 24px;
      color: var(--muted); font-style: italic;
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* ── Cart ───────────────────────────────────────────────── */
    .cart-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.78);
      backdrop-filter: blur(6px); z-index: 200;
      display: none; opacity: 0; transition: opacity .3s;
    }
    .cart-overlay.open { display: block; opacity: 1; }
    .cart-panel {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: 100%; max-width: 430px;
      background: var(--card2); border-left: 1px solid var(--bdr);
      display: flex; flex-direction: column;
      transform: translateX(100%); transition: transform .35s cubic-bezier(.4,0,.2,1);
    }
    .cart-overlay.open .cart-panel { transform: none; }

    .cart-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px; border-bottom: 1px solid var(--bdr);
    }
    .cart-title {
      font-family: 'Playfair Display', serif;
      font-size: .95rem; letter-spacing: .2em; text-transform: uppercase; font-weight: 400;
    }
    .cart-title-orn { width: 40px; height: 1px; background: var(--gold); margin-top: 6px; opacity: .4; }
    .close-btn {
      background: none; border: 1px solid var(--bdr); color: var(--muted);
      width: 32px; height: 32px; cursor: pointer; font-size: 15px;
      transition: border-color .2s, color .2s;
    }
    .close-btn:hover { border-color: var(--gold); color: var(--gold); }

    .cart-items { flex: 1; overflow-y: auto; padding: 12px 24px; }
    .cart-item { display: flex; align-items: flex-start; gap: 14px; padding: 16px 0; border-bottom: 1px solid var(--bdr2); }
    .ci-info { flex: 1; }
    .ci-name { font-size: .85rem; font-weight: 600; margin-bottom: 3px; }
    .ci-detail { font-size: .68rem; color: var(--muted); }
    .ci-price { font-size: .9rem; color: var(--gold); font-weight: 700; white-space: nowrap; }
    .ci-del { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; line-height: 1; }
    .ci-del:hover { color: var(--red); }
    .cart-empty { text-align: center; padding: 60px 24px; color: var(--muted); font-style: italic; }
    .cart-empty-icon { font-size: 40px; margin-bottom: 12px; }

    .cart-footer { padding: 20px 24px; border-top: 1px solid var(--bdr); }
    .cart-total { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .cart-total-lbl { font-size: .8rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); }
    .cart-total-val {
      font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold-dk), var(--gold-lt));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .order-btn {
      width: 100%; background: linear-gradient(135deg, var(--gold-dk), var(--gold));
      color: var(--bg); border: none; padding: 16px;
      font-size: .76rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase;
      cursor: pointer; font-family: 'Lato', sans-serif; transition: opacity .2s, transform .1s;
    }
    .order-btn:hover { opacity: .88; }
    .order-btn:active { transform: scale(.99); }

    footer {
      text-align: center; padding: 22px;
      color: var(--muted); font-size: .62rem;
      letter-spacing: .18em; text-transform: uppercase;
      border-top: 1px solid var(--bdr2);
    }

    @media (max-width: 600px) {
      .header-inner { padding: 12px 16px; }
      .logo-name { font-size: 1.2rem; }
      .filters-wrap { padding: 12px 16px; }
      .products { padding: 12px 8px 50px; }
      .cart-panel { max-width: 100%; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header class="site-header">
  <div class="header-inner">
    <div>
      <div class="logo-name">YaraDutyFree</div>
      <div class="logo-tagline">Fragancias Árabes &nbsp;·&nbsp; Lujo Oriental</div>
      <div class="logo-orn"></div>
    </div>
    <div class="header-right">
      <div class="ws-status">
        <div class="ws-dot" id="wsDot"></div>
        <span class="ws-label" id="wsLabel">Conectando…</span>
      </div>
      <button class="cart-toggle" onclick="toggleCart()">
        <span>🛍</span><span>Carrito</span>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </div>
</header>

<!-- ── Filters ─────────────────────────────────────────────── -->
<div class="filters-wrap">
  <div class="filters-inner">
    <div class="search-row">
      <span class="search-ico">🔍</span>
      <input class="search-input" id="searchInput" type="text"
        placeholder="Buscar perfumes por nombre, descripción o marca…"
        oninput="onSearch(this.value)" autocomplete="off">
    </div>
    <div class="brands-row" id="brandsBar"></div>
  </div>
</div>

<!-- ── Ornament ────────────────────────────────────────────── -->
<div class="orn-row"><span class="orn-gem">◆ ◇ ◆</span></div>

<!-- ── Section ────────────────────────────────────────────── -->
<div class="section-head">
  <div class="section-title">Nuestra Colección</div>
  <div class="section-count" id="productCount"></div>
</div>

<!-- ── Grid ───────────────────────────────────────────────── -->
<div class="products" id="productsGrid"></div>

<!-- ── Footer ─────────────────────────────────────────────── -->
<footer>YaraDutyFree &nbsp;◆&nbsp; Fragancias Árabes &nbsp;◆&nbsp; Pedidos por WhatsApp</footer>

<!-- ── Cart ───────────────────────────────────────────────── -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCartOutside(event)">
  <div class="cart-panel">
    <div class="cart-header">
      <div>
        <div class="cart-title">Tu Carrito</div>
        <div class="cart-title-orn"></div>
      </div>
      <button class="close-btn" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer" id="cartFooter" style="display:none">
      <div class="cart-total">
        <span class="cart-total-lbl">Total</span>
        <span class="cart-total-val" id="cartTotal"></span>
      </div>
      <button class="order-btn" onclick="placeOrder()">
        Hacer Pedido por WhatsApp &nbsp;→
      </button>
    </div>
  </div>
</div>

      icon: "🌹",
      badge: null,
      image: null,
      brand: null
    }
  ];

  /* ── Filter state ────────────────────────────────────────── */
  let activeBrand = '';
  let searchText  = '';

  function renderBrands() {
    const bar = document.getElementById('brandsBar');
    let h = `<button class="brand-pill ${!activeBrand?'active':''}" data-brand="">Todas</button>`;
    brands.forEach(b => {
      const active = activeBrand && activeBrand.toLowerCase()===b.toLowerCase() ? 'active' : '';
      h += `<button class="brand-pill ${active}" data-brand="${b.replace(/"/g,'&quot;')}">${b}</button>`;
    });
    bar.innerHTML = h;
  }

  function setBrand(b) { activeBrand = b; renderBrands(); applyFilters(); }
  function onSearch(v) { searchText = v.trim(); applyFilters(); }

  function applyFilters() {
    const q = searchText.toLowerCase();
    const ab = activeBrand.toLowerCase();
    const list = products.filter(p => {
      const okB = !activeBrand || (p.brand||'').toLowerCase() === ab;
      const okS = !q
        || (p.name  ||'').toLowerCase().includes(q)
        || (p.desc  ||'').toLowerCase().includes(q)
        || (p.brand ||'').toLowerCase().includes(q);
      return okB && okS;
    });
    renderProducts(list);
  }

  function renderProducts(list) {
    const grid = document.getElementById('productsGrid');
    const cnt  = document.getElementById('productCount');
    cnt.textContent = list.length
      ? `${list.length} perfume${list.length!==1?'s':''} disponible${list.length!==1?'s':''}`
      : '';

    if (!list.length) {
      grid.innerHTML = `<div class="empty-state">
        <div class="empty-icon">🔍</div>
        <p>No se encontraron perfumes</p>
      </div>`;
      return;
    }
    grid.innerHTML = list.map(p => {
      const imgH = p.image
        ? `<img src="${p.image}" alt="${p.name}" class="prod-img" loading="lazy">`
        : `<span class="prod-emoji">${p.icon||'🌹'}</span>`;
      return `
      <div class="product-card">
        <div class="prod-img-wrap">
          ${imgH}
          ${p.badge?`<div class="prod-badge">${p.badge}</div>`:''}
          ${p.brand?`<div class="prod-brand-tag">${p.brand}</div>`:''}
        </div>
        <div class="prod-info">
          <div class="prod-name">${p.name}</div>
          <div class="prod-desc">${p.desc||''}</div>
        </div>
        <div class="prod-footer">
          <div>
            <div class="prod-price">${CURRENCY}${Number(p.price).toLocaleString('es-CO')}</div>
            <div class="prod-size">${p.size||''}</div>
          </div>
          <button class="add-btn" onclick="addToCart(${p.id})">Agregar</button>
        </div>
      </div>`;
    }).join('');
  }

  /* ── Cart ────────────────────────────────────────────────── */
  let cart = {};

  function addToCart(id) {
    const p = products.find(x=>x.id===id); if(!p) return;
    cart[id] = (cart[id]||0)+1;
    updateCartUI();
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '✓ Agregado';
    btn.style.cssText = 'background:var(--green);border-color:var(--green);color:#fff';
    setTimeout(()=>{ btn.textContent=orig; btn.style.cssText=''; }, 1300);
  }

  function removeFromCart(id) { delete cart[id]; updateCartUI(); }

  function updateCartUI() {
    const total = Object.entries(cart).reduce((s,[id,q])=>{
      const p=products.find(x=>x.id==id); return s+(p?p.price*q:0);
    },0);
    const count = Object.values(cart).reduce((a,b)=>a+b,0);
    const cntEl = document.getElementById('cartCount');
    cntEl.textContent = count;
    cntEl.style.display = count?'inline-flex':'none';

    const items  = document.getElementById('cartItems');
    const footer = document.getElementById('cartFooter');
    document.getElementById('cartTotal').textContent = CURRENCY+total.toLocaleString('es-CO');

    if(!count){
      items.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛍</div><p>Tu carrito está vacío</p></div>`;
      footer.style.display='none'; return;
    }
    footer.style.display='';
    items.innerHTML = Object.entries(cart).map(([id,qty])=>{
      const p=products.find(x=>x.id==id); if(!p) return '';
      return `<div class="cart-item">
        <div class="ci-info">
          <div class="ci-name">${p.name} <small style="color:var(--muted)">×${qty}</small></div>
          <div class="ci-detail">${p.size||''}${p.brand?' · '+p.brand:''}</div>
        </div>
        <div class="ci-price">${CURRENCY}${(p.price*qty).toLocaleString('es-CO')}</div>
        <button class="ci-del" onclick="removeFromCart(${id})">×</button>
      </div>`;
    }).join('');
  }

  function toggleCart() {
    const ov = document.getElementById('cartOverlay');
    ov.classList.toggle('open');
    if(ov.classList.contains('open')) updateCartUI();
  }
  function closeCartOutside(e) { if(e.target===document.getElementById('cartOverlay')) toggleCart(); }

  /* ── WhatsApp order ──────────────────────────────────────── */
  function placeOrder() {
    if(!Object.keys(cart).length) return;
    const items=[]; let total=0;
    Object.entries(cart).forEach(([id,qty])=>{
      const p=products.find(x=>x.id==id);
      if(p){ items.push({name:p.name,size:p.size,qty,subtotal:p.price*qty}); total+=p.price*qty; }
    });
    let msg=`🌹 *Pedido — ${STORE_NAME}*\n\n`;
    items.forEach(i=>{ msg+=`▪ ${i.name} (${i.size}) × ${i.qty} = ${CURRENCY}${i.subtotal.toLocaleString('es-CO')}\n`; });
    msg+=`\n*Total: ${CURRENCY}${total.toLocaleString('es-CO')}*\n\n_Enviado desde la tienda web_`;
    if(ws&&ws.readyState===WebSocket.OPEN)
      ws.send(JSON.stringify({type:'order',name:'Cliente Web',city:'',items,total:total.toLocaleString('es-CO')}));
    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`,'_blank');
  }

  /* ── WebSocket ───────────────────────────────────────────── */
  let ws=null, wsDelay=2000;

  function wsConnect(){
    try{ ws=new WebSocket(WS_URL); }
    catch(e){ setTimeout(wsConnect,wsDelay); return; }
    ws.onopen=()=>{ setDot('conn','Conectado'); wsDelay=2000; };
    ws.onmessage=e=>{
      try{
        const m=JSON.parse(e.data);
        if(m.type==='products'||m.type==='state'){
          if(Array.isArray(m.products)&&m.products.length) products=m.products;
          if(Array.isArray(m.brands)) brands=m.brands;
          renderBrands(); applyFilters(); setDot('live','En vivo');
        }
      }catch(e2){}
    };
    ws.onclose=()=>{ setDot('','Desconectado'); setTimeout(wsConnect, wsDelay=Math.min(wsDelay*1.5,30000)); };
    ws.onerror=()=>{ setDot('','Sin conexión'); };
  }
  function setDot(cls,lbl){
    const d=document.getElementById('wsDot'), l=document.getElementById('wsLabel');
    d.className='ws-dot '+cls; l.textContent=lbl;
    l.style.color=cls==='live'?'var(--green)':cls==='conn'?'var(--gold)':'var(--muted)';
  }

  /* ── Init ────────────────────────────────────────────────── */
  document.getElementById('brandsBar').addEventListener('click', e => {
    const btn = e.target.closest('.brand-pill');
    if (btn) setBrand(btn.dataset.brand);
  });

  renderBrands();
  applyFilters();
  wsConnect();
</script>
</body>
</html>
